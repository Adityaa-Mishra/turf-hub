<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Turfs — TurfHub</title>
<link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<nav class="nav" id="navbar"></nav>
<div class="dash-layout">
  <aside class="sidebar">
    <ul class="sb-nav">
      <li><a href="owner-dashboard.html"><span class="ic">▦</span> Dashboard</a></li>
      <li><a href="my-turfs.html" class="on"><span class="ic">⬚</span> My Turfs</a></li>
      <li><a href="add-turf.html"><span class="ic">+</span> Add Turf</a></li>
      <li><a href="booking-requests.html"><span class="ic">▤</span> Booking Requests</a></li>
      <div class="sb-section-lbl">Account</div>
      <li><a href="profile.html"><span class="ic">◐</span> Profile</a></li>
    </ul>
  </aside>

  <main class="dash-content">
    <div class="dash-header">
      <div>
        <h1 class="dash-title">My turfs</h1>
        <p class="dash-sub" id="turfCount">Loading…</p>
      </div>
      <a href="add-turf.html" class="btn btn-primary">+ Add new turf</a>
    </div>

    <div id="turfsContainer"><div class="loading-box"><div class="spin spin-lg"></div></div></div>
  </main>
</div>

<!-- Add Sport Modal -->
<div class="modal-backdrop" id="addSportModal">
  <div class="modal">
    <div class="modal-head"><h3>Add sport</h3><button class="modal-x" onclick="Modal.close('addSportModal')">✕</button></div>
    <div class="modal-body">
      <div class="form-stack">
        <input type="hidden" id="sportTurfId"/>
        <div class="form-row">
          <label>Sport name</label>
          <select id="sportName" class="field">
            <option value="">Select or type custom…</option>
            <option>Football</option><option>Cricket</option><option>Badminton</option>
            <option>Volleyball</option><option>Basketball</option><option>Tennis</option>
            <option>Hockey</option><option>Kabaddi</option><option>Table Tennis</option>
            <option value="custom">Custom sport…</option>
          </select>
        </div>
        <div class="form-row hidden" id="customSportGroup">
          <label>Custom sport name</label>
          <input type="text" id="customSportName" class="field" placeholder="e.g. Pickleball" />
        </div>
        <div class="form-grid-2">
          <div class="form-row"><label>Opening time</label><input type="time" id="openingTime" class="field" value="06:00" /></div>
          <div class="form-row"><label>Closing time</label><input type="time" id="closingTime" class="field" value="22:00" /></div>
          <div class="form-row"><label>Price per hour (₹)</label><input type="number" id="pricePerHour" class="field" placeholder="500" min="1" /></div>
          <div class="form-row">
            <label>Slot duration</label>
            <select id="slotDuration" class="field">
              <option value="30">30 min</option><option value="60" selected>60 min</option>
              <option value="90">90 min</option><option value="120">120 min</option>
            </select>
          </div>
          <div class="form-row"><label>Number of courts</label><input type="number" id="totalCourts" class="field" value="1" min="1" max="20" /></div>
        </div>
        <div id="sportError" class="alert alert-error hidden"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="Modal.close('addSportModal')">Cancel</button>
      <button class="btn btn-primary" id="saveSportBtn" onclick="saveSport()">Add sport</button>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
if (!Auth.requireAuth()) throw new Error();
if (!Auth.isOwner()) window.location.href = 'customer-dashboard.html';

async function loadMyTurfs() {
  const container = document.getElementById('turfsContainer');
  try {
    const res = await API.get('/turfs/owner/my-turfs');
    const turfs = res.data || [];
    document.getElementById('turfCount').textContent = `${turfs.length} turf${turfs.length !== 1 ? 's' : ''} listed`;

    if (!turfs.length) {
      container.innerHTML = `<div class="empty"><div class="empty-ico">🏟️</div><h3>No turfs listed yet</h3><p>Add your first turf to start accepting bookings</p><a href="add-turf.html" class="btn btn-primary mt-3">+ Add your first turf</a></div>`;
      return;
    }
    container.innerHTML = turfs.map(renderTurfRow).join('');
  } catch (err) {
    container.innerHTML = `<div class="empty"><div class="empty-ico">⚠️</div><h3>${err.message}</h3></div>`;
  }
}

function renderTurfRow(turf) {
  const imgUrl = Utils.getTurfImageUrl(turf) || Utils.placeholderSVG(120,90);
  const sports = turf.sports || [];

  return `
    <div class="card mb-4">
      <div style="display:flex;gap:16px;padding:20px;align-items:flex-start;flex-wrap:wrap;">
        <div style="width:120px;height:90px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--bg);">
          <img src="${imgUrl}" style="width:100%;height:100%;object-fit:cover;" onerror="this.src='${Utils.placeholderSVG(120,90)}'" />
        </div>
        <div style="flex:1;min-width:0;">
          <div class="flex items-start justify-between gap-3 flex-wrap">
            <div>
              <h4 style="margin-bottom:4px;">${turf.name} ${turf.isActive ? '' : '<span class="badge badge-declined" style="margin-left:6px;">Inactive</span>'}</h4>
              <div class="text-xs text-muted mb-3">${turf.address?.street || ''}, ${turf.address?.city || ''}</div>
              <div class="flex gap-2 flex-wrap mb-2">
                ${sports.map(s => `<span class="sport-pill">${Utils.getSportIcon(s.sportName)} ${s.sportName} · ${Utils.formatCurrency(s.pricePerHour)}/hr</span>`).join('')}
                ${!sports.length ? '<span class="text-muted text-sm">No sports added</span>' : ''}
              </div>
            </div>
            <div class="flex gap-2 flex-wrap" style="flex-shrink:0;">
              <button class="btn btn-secondary btn-sm" onclick="openAddSport('${turf._id}')">+ Sport</button>
              <a href="add-turf.html?id=${turf._id}" class="btn btn-secondary btn-sm">Edit</a>
              <button class="btn btn-danger btn-sm" onclick="toggleActive('${turf._id}', ${turf.isActive})">${turf.isActive ? 'Deactivate' : 'Activate'}</button>
            </div>
          </div>

          ${sports.length ? `
          <div class="table-wrap mt-3">
            <table>
              <thead><tr><th>Sport</th><th>Price/hr</th><th>Hours</th><th>Slot</th><th>Courts</th><th>Actions</th></tr></thead>
              <tbody>${sports.map(s => `
                <tr>
                  <td>${Utils.getSportIcon(s.sportName)} ${s.sportName}</td>
                  <td class="font-semi text-blue">${Utils.formatCurrency(s.pricePerHour)}</td>
                  <td class="text-xs">${s.openingTime} – ${s.closingTime}</td>
                  <td>${s.slotDuration} min</td>
                  <td>${s.totalCourts}</td>
                  <td><button class="btn btn-danger btn-xs" onclick="removeSport('${s._id}')">Remove</button></td>
                </tr>`).join('')}
              </tbody>
            </table>
          </div>` : ''}
        </div>
      </div>
    </div>`;
}

function openAddSport(turfId) {
  document.getElementById('sportTurfId').value = turfId;
  document.getElementById('sportError').classList.add('hidden');

  const btn = document.getElementById('saveSportBtn');
  btn.innerHTML = 'Add sport';
  btn.disabled = false;
  document.getElementById('sportName').value = '';
  document.getElementById('customSportGroup').classList.add('hidden');
  document.getElementById('customSportName').value = '';
  document.getElementById('pricePerHour').value = '';
  document.getElementById('openingTime').value = '06:00';
  document.getElementById('closingTime').value = '22:00';
  document.getElementById('slotDuration').value = '60';
  document.getElementById('totalCourts').value = '1';

  Modal.open('addSportModal');
}

document.getElementById('sportName').addEventListener('change', function() {
  document.getElementById('customSportGroup').classList.toggle('hidden', this.value !== 'custom');
});

async function saveSport() {
  const btn = document.getElementById('saveSportBtn');
  const errEl = document.getElementById('sportError');
  errEl.classList.add('hidden');

  const turfId = document.getElementById('sportTurfId').value;
  const sportNameSel = document.getElementById('sportName').value;
  const customName = document.getElementById('customSportName').value.trim();
  const sportName = sportNameSel === 'custom' ? customName : sportNameSel;

  if (!sportName) { errEl.textContent = 'Select or enter a sport name.'; errEl.classList.remove('hidden'); return; }

  Utils.setButtonLoading(btn, true, 'Saving…');
  try {
    await API.post('/sports', {
      turfId, sportName,
      pricePerHour: parseInt(document.getElementById('pricePerHour').value),
      openingTime: document.getElementById('openingTime').value,
      closingTime: document.getElementById('closingTime').value,
      slotDuration: parseInt(document.getElementById('slotDuration').value),
      totalCourts: parseInt(document.getElementById('totalCourts').value)
    });
    Utils.setButtonLoading(btn, false);
    Modal.close('addSportModal');
    Toast.success(`${sportName} added`);
    loadMyTurfs();
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
    Utils.setButtonLoading(btn, false);
  }
}

async function removeSport(sportId) {
  if (!confirm('Remove this sport? Existing bookings will not be affected.')) return;
  try { await API.delete(`/sports/${sportId}`); Toast.success('Sport removed'); loadMyTurfs(); }
  catch (err) { Toast.error(err.message); }
}

async function toggleActive(turfId, isActive) {
  const action = isActive ? 'deactivate' : 'activate';
  if (!confirm(`${action.charAt(0).toUpperCase()+action.slice(1)} this turf?`)) return;
  try { await API.put(`/turfs/${turfId}`, { isActive: !isActive }); Toast.success(`Turf ${isActive?'deactivated':'activated'}`); loadMyTurfs(); }
  catch (err) { Toast.error(err.message); }
}

loadMyTurfs();
</script>
</body>
</html>
